<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            background: #1a1a2e;
            border: 3px solid #16f4d0;
            box-shadow: 0 0 20px rgba(22, 244, 208, 0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 800px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 5px;
            color: #16f4d0;
            font-size: 1.5em;
            font-weight: bold;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .score-label {
            font-size: 0.8em;
            opacity: 0.8;
        }

        .instructions {
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 5px;
            width: 800px;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .instructions p {
            margin: 5px 0;
        }

        button {
            padding: 10px 30px;
            font-size: 1em;
            background: #16f4d0;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00d9a3;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">Player</span>
                <span id="playerScore">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Computer</span>
                <span id="computerScore">0</span>
            </div>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse Y-axis OR ⬆️⬇️ Arrow Keys to move the left paddle</p>
            <p>The computer controls the right paddle. Try to keep the ball in play!</p>
        </div>

        <button onclick="resetGame()">🔄 Reset Game</button>
    </div>

    <script>
        // Canvas and context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = 800;
        canvas.height = 400;

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 8;
        const ballSpeed = 5;

        let playerPaddle = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 7
        };

        let computerPaddle = {
            x: canvas.width - paddleWidth - 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 5
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: ballSpeed,
            dy: ballSpeed,
            radius: ballSize
        };

        let scores = {
            player: 0,
            computer: 0
        };

        // Mouse tracking
        let mouseY = canvas.height / 2;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Keyboard controls
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Update player paddle position
        function updatePlayerPaddle() {
            // Use mouse position
            playerPaddle.y = mouseY - playerPaddle.height / 2;

            // Also support arrow keys
            if (keys['ArrowUp']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown']) {
                playerPaddle.y += playerPaddle.speed;
            }

            // Boundary collision for player paddle
            if (playerPaddle.y < 0) {
                playerPaddle.y = 0;
            }
            if (playerPaddle.y + playerPaddle.height > canvas.height) {
                playerPaddle.y = canvas.height - playerPaddle.height;
            }
        }

        // Update computer paddle position (AI)
        function updateComputerPaddle() {
            const computerCenter = computerPaddle.y + computerPaddle.height / 2;

            // Simple AI: follow the ball
            if (computerCenter < ball.y - 35) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ball.y + 35) {
                computerPaddle.y -= computerPaddle.speed;
            }

            // Boundary collision for computer paddle
            if (computerPaddle.y < 0) {
                computerPaddle.y = 0;
            }
            if (computerPaddle.y + computerPaddle.height > canvas.height) {
                computerPaddle.y = canvas.height - computerPaddle.height;
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top and bottom wall collision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = ball.y - ball.radius < 0 ? ball.radius : canvas.height - ball.radius;
            }

            // Left paddle collision
            if (
                ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = playerPaddle.x + playerPaddle.width + ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (playerPaddle.y + playerPaddle.height / 2)) / (playerPaddle.height / 2);
                ball.dy += hitPos * 3;
            }

            // Right paddle collision
            if (
                ball.x + ball.radius > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computerPaddle.x - ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computerPaddle.y + computerPaddle.height / 2)) / (computerPaddle.height / 2);
                ball.dy += hitPos * 3;
            }

            // Score points
            if (ball.x - ball.radius < 0) {
                scores.computer++;
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                scores.player++;
                resetBall();
            }

            updateScoreboard();
        }

        // Reset ball position
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ballSpeed;
            ball.dy = (Math.random() - 0.5) * ballSpeed * 2;
        }

        // Update scoreboard display
        function updateScoreboard() {
            document.getElementById('playerScore').textContent = scores.player;
            document.getElementById('computerScore').textContent = scores.computer;
        }

        // Draw functions
        function drawPaddle(paddle) {
            ctx.fillStyle = '#16f4d0';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle = '#00d9a3';
            ctx.lineWidth = 2;
            ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ff8787';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(22, 244, 208, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawBackground() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Main game loop
        function gameLoop() {
            drawBackground();
            drawCenterLine();

            updatePlayerPaddle();
            updateComputerPaddle();
            updateBall();

            drawPaddle(playerPaddle);
            drawPaddle(computerPaddle);
            drawBall();

            requestAnimationFrame(gameLoop);
        }

        // Reset game
        function resetGame() {
            scores.player = 0;
            scores.computer = 0;
            playerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            computerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            resetBall();
            updateScoreboard();
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
