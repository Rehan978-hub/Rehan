<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game - Advanced Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 100%;
            padding: 10px;
        }

        h1 {
            color: white;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-top: 10px;
        }

        /* Difficulty Selection Modal */
        .modal {
            display: flex;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .difficulty-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .difficulty-btn.selected {
            background: #667eea;
            color: white;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .start-btn {
            padding: 15px 40px;
            background: #16f4d0;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn:hover:not(:disabled) {
            background: #00d9a3;
            transform: scale(1.05);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Game Container */
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 400px;
            max-height: 600px;
            background: #1a1a2e;
            border: 3px solid #16f4d0;
            box-shadow: 0 0 20px rgba(22, 244, 208, 0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Game Info */
        .game-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            gap: 20px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: white;
        }

        .score-label {
            font-size: 0.9em;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #16f4d0;
        }

        .difficulty-display {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .game-status {
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }

        .game-status h2 {
            color: #16f4d0;
            margin-bottom: 10px;
        }

        .game-status p {
            margin: 5px 0;
        }

        .controls {
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            font-size: 0.9em;
        }

        button {
            padding: 12px 30px;
            background: #16f4d0;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #00d9a3;
            transform: scale(1.05);
        }

        /* Fire Animation */
        @keyframes fire {
            0% {
                box-shadow: 0 0 5px #ff6b6b, 0 0 10px #ff6b6b;
                filter: brightness(1.2);
            }
            50% {
                box-shadow: 0 0 15px #ff6b6b, 0 0 25px #ff4444, 0 0 35px #ff2222;
                filter: brightness(1.5);
            }
            100% {
                box-shadow: 0 0 5px #ff6b6b, 0 0 10px #ff6b6b;
                filter: brightness(1.2);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
                margin-top: 5px;
            }

            .modal-content {
                padding: 20px;
                width: 90%;
            }

            .difficulty-options {
                grid-template-columns: 1fr;
            }

            .game-info {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 PONG GAME ADVANCED 🔥</h1>

        <!-- Difficulty Selection Modal -->
        <div id="difficultyModal" class="modal">
            <div class="modal-content">
                <h2>Select Difficulty Level</h2>
                <div class="difficulty-options">
                    <button class="difficulty-btn" onclick="selectDifficulty('easy')">
                        🟢 EASY
                    </button>
                    <button class="difficulty-btn" onclick="selectDifficulty('normal')">
                        🟡 NORMAL
                    </button>
                    <button class="difficulty-btn" onclick="selectDifficulty('hard')">
                        🔴 HARD
                    </button>
                </div>
                <p style="color: #666; margin-bottom: 20px;">First to 7 points wins!</p>
                <button class="start-btn" id="startBtn" disabled onclick="startGame()">
                    START GAME
                </button>
            </div>
        </div>

        <!-- Game Container -->
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Game Info -->
        <div class="game-info">
            <div class="score-item">
                <span class="score-label">You</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="difficulty-display" id="difficultyDisplay">SELECT DIFFICULTY</div>
            <div class="score-item">
                <span class="score-label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>

        <!-- Game Status -->
        <div class="game-status" id="gameStatus" style="display: none;">
            <h2 id="statusTitle">🎉 You Won!</h2>
            <p id="statusMessage">Final Score: You 7 - 5 Computer</p>
            <button onclick="resetGame()">🔄 Play Again</button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <p>🖱️ Move mouse UP/DOWN or use ⬆️⬇️ Keys to control paddle</p>
            <p>💨 Fast moves = POWER SHOT (Ball turns 🔥)</p>
        </div>
    </div>

    <script>
        // Canvas and context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameState = 'difficulty-select';
        let selectedDifficulty = null;
        let gameActive = false;

        // Set canvas size (vertical orientation)
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Game objects
        const paddleWidth = Math.max(10, canvas.width * 0.02);
        const paddleHeight = Math.max(80, canvas.height * 0.2);
        const ballSize = Math.max(6, canvas.width * 0.015);
        const ballBaseSpeed = canvas.width * 0.01;

        let playerPaddle = {
            x: 15,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: canvas.height * 0.01,
            lastY: 0,
            velocity: 0
        };

        let computerPaddle = {
            x: canvas.width - paddleWidth - 15,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: ballBaseSpeed * 0.7,
            lastY: 0
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: ballBaseSpeed,
            dy: ballBaseSpeed,
            radius: ballSize,
            speed: ballBaseSpeed,
            isOnFire: false,
            fireTimer: 0,
            trailX: [],
            trailY: [],
            trailOpacity: []
        };

        let scores = {
            player: 0,
            computer: 0
        };

        let difficultySettings = {
            easy: {
                computerSpeed: 0.004,
                ballSpeed: 0.008,
                paddleControlSensitivity: 0.15,
                powerShotThreshold: 8
            },
            normal: {
                computerSpeed: 0.007,
                ballSpeed: 0.011,
                paddleControlSensitivity: 0.12,
                powerShotThreshold: 6
            },
            hard: {
                computerSpeed: 0.009,
                ballSpeed: 0.014,
                paddleControlSensitivity: 0.1,
                powerShotThreshold: 4
            }
        };

        // Mouse tracking
        let mouseY = canvas.height / 2;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Keyboard controls
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Difficulty selection
        function selectDifficulty(difficulty) {
            selectedDifficulty = difficulty;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            document.getElementById('startBtn').disabled = false;
        }

        // Start game
        function startGame() {
            if (!selectedDifficulty) return;

            gameState = 'playing';
            gameActive = true;
            document.getElementById('difficultyModal').classList.add('hidden');
            document.getElementById('gameStatus').style.display = 'none';
            document.getElementById('difficultyDisplay').textContent = selectedDifficulty.toUpperCase();

            // Adjust AI speed and ball speed based on difficulty
            const settings = difficultySettings[selectedDifficulty];
            computerPaddle.speed = canvas.height * settings.computerSpeed;
            ball.speed = canvas.width * settings.ballSpeed;
            ball.dx = ball.speed;
            ball.dy = ball.speed * 0.5;

            gameLoop();
        }

        // Update player paddle position
        function updatePlayerPaddle() {
            const oldY = playerPaddle.y;
            
            // Use mouse position
            playerPaddle.y = mouseY - playerPaddle.height / 2;

            // Also support arrow keys
            if (keys['ArrowUp']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown']) {
                playerPaddle.y += playerPaddle.speed;
            }

            // Boundary collision for player paddle
            if (playerPaddle.y < 0) {
                playerPaddle.y = 0;
            }
            if (playerPaddle.y + playerPaddle.height > canvas.height) {
                playerPaddle.y = canvas.height - playerPaddle.height;
            }

            // Calculate paddle velocity for power shot detection
            playerPaddle.velocity = Math.abs(playerPaddle.y - oldY);
            playerPaddle.lastY = oldY;
        }

        // Update computer paddle position (AI)
        function updateComputerPaddle() {
            const computerCenter = computerPaddle.y + computerPaddle.height / 2;
            const settings = difficultySettings[selectedDifficulty];

            // AI with difficulty-based tracking
            const trackingDistance = canvas.height * (0.1 + (1 - settings.computerSpeed) * 0.15);

            if (computerCenter < ball.y - trackingDistance) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ball.y + trackingDistance) {
                computerPaddle.y -= computerPaddle.speed;
            }

            // Boundary collision for computer paddle
            if (computerPaddle.y < 0) {
                computerPaddle.y = 0;
            }
            if (computerPaddle.y + computerPaddle.height > canvas.height) {
                computerPaddle.y = canvas.height - computerPaddle.height;
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Add to trail
            if (ball.isOnFire) {
                ball.trailX.push(ball.x);
                ball.trailY.push(ball.y);
                ball.trailOpacity.push(1);

                if (ball.trailX.length > 10) {
                    ball.trailX.shift();
                    ball.trailY.shift();
                    ball.trailOpacity.shift();
                }

                for (let i = 0; i < ball.trailOpacity.length; i++) {
                    ball.trailOpacity[i] -= 0.1;
                }
            } else {
                ball.trailX = [];
                ball.trailY = [];
                ball.trailOpacity = [];
            }

            // Top and bottom wall collision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = ball.y - ball.radius < 0 ? ball.radius : canvas.height - ball.radius;
            }

            // Left paddle collision
            if (
                ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height &&
                ball.dx < 0
            ) {
                ball.dx = -ball.dx;
                ball.x = playerPaddle.x + playerPaddle.width + ball.radius;

                const settings = difficultySettings[selectedDifficulty];
                
                // Check for power shot
                if (playerPaddle.velocity > canvas.height * settings.paddleControlSensitivity) {
                    ball.isOnFire = true;
                    ball.fireTimer = 60; // Fire effect duration
                    ball.speed = ball.speed * 1.5; // Speed up the ball
                    ball.dx = -ball.dx * 1.3;
                } else {
                    ball.speed = difficultySettings[selectedDifficulty].ballSpeed * canvas.width;
                    ball.dx = -ball.dx;
                }

                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (playerPaddle.y + playerPaddle.height / 2)) / (playerPaddle.height / 2);
                ball.dy += hitPos * ball.speed * 0.3;
            }

            // Right paddle collision
            if (
                ball.x + ball.radius > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height &&
                ball.dx > 0
            ) {
                ball.dx = -ball.dx;
                ball.x = computerPaddle.x - ball.radius;

                const settings = difficultySettings[selectedDifficulty];
                ball.speed = difficultySettings[selectedDifficulty].ballSpeed * canvas.width;

                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computerPaddle.y + computerPaddle.height / 2)) / (computerPaddle.height / 2);
                ball.dy += hitPos * ball.speed * 0.3;
            }

            // Score points
            if (ball.x - ball.radius < 0) {
                scores.computer++;
                updateScoreboard();
                checkGameEnd();
                if (gameActive) resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                scores.player++;
                updateScoreboard();
                checkGameEnd();
                if (gameActive) resetBall();
            }

            // Update fire effect
            if (ball.fireTimer > 0) {
                ball.fireTimer--;
            } else {
                ball.isOnFire = false;
            }
        }

        // Reset ball position
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.isOnFire = false;
            ball.fireTimer = 0;
            ball.trailX = [];
            ball.trailY = [];
            ball.trailOpacity = [];
            ball.speed = difficultySettings[selectedDifficulty].ballSpeed * canvas.width;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed * 2;
        }

        // Update scoreboard display
        function updateScoreboard() {
            document.getElementById('playerScore').textContent = scores.player;
            document.getElementById('computerScore').textContent = scores.computer;
        }

        // Check game end condition (first to 7 wins)
        function checkGameEnd() {
            if (scores.player >= 7) {
                endGame('You', scores.player, scores.computer);
            } else if (scores.computer >= 7) {
                endGame('Computer', scores.computer, scores.player);
            }
        }

        // End game
        function endGame(winner, winnerScore, loserScore) {
            gameActive = false;
            const statusDiv = document.getElementById('gameStatus');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');

            if (winner === 'You') {
                statusTitle.textContent = '🎉 YOU WON! 🎉';
                statusTitle.style.color = '#16f4d0';
            } else {
                statusTitle.textContent = '💻 COMPUTER WON!';
                statusTitle.style.color = '#ff6b6b';
            }

            statusMessage.textContent = `Final Score: ${winner} ${winnerScore} - ${loserScore} ${winner === 'You' ? 'Computer' : 'You'}`;
            statusDiv.style.display = 'block';
        }

        // Reset game
        function resetGame() {
            gameState = 'difficulty-select';
            selectedDifficulty = null;
            gameActive = false;
            scores = { player: 0, computer: 0 };
            playerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            computerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            resetBall();
            updateScoreboard();
            document.getElementById('difficultyModal').classList.remove('hidden');
            document.getElementById('gameStatus').style.display = 'none';
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById('startBtn').disabled = true;
            document.getElementById('difficultyDisplay').textContent = 'SELECT DIFFICULTY';
        }

        // Draw functions
        function drawPaddle(paddle) {
            ctx.fillStyle = '#16f4d0';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle = '#00d9a3';
            ctx.lineWidth = 2;
            ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            // Draw fire trail
            if (ball.isOnFire && ball.trailX.length > 0) {
                for (let i = 0; i < ball.trailX.length; i++) {
                    const trailRadius = ball.radius * (1 - i / ball.trailX.length);
                    ctx.fillStyle = `rgba(255, 107, 107, ${ball.trailOpacity[i] * 0.6})`;
                    ctx.beginPath();
                    ctx.arc(ball.trailX[i], ball.trailY[i], trailRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            if (ball.isOnFire) {
                // Draw fire effect glow
                ctx.fillStyle = 'rgba(255, 107, 107, 0.4)';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius * 1.8, 0, Math.PI * 2);
                ctx.fill();

                // Draw fire particles
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.random() * Math.PI * 2);
                    const speed = Math.random() * 3 + 2;
                    const px = ball.x + Math.cos(angle) * ball.radius * 2;
                    const py = ball.y + Math.sin(angle) * ball.radius * 2;
                    
                    ctx.fillStyle = `rgba(255, ${Math.floor(Math.random() * 150 + 100)}, 0, ${Math.random() * 0.6})`;
                    ctx.fillRect(px - 3, py - 3, 6, 6);
                }
            }

            // Main ball
            ctx.fillStyle = ball.isOnFire ? '#ff4444' : '#ff6b6b';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            const glowColor = ball.isOnFire ? '#ff8787' : '#ff8787';
            ctx.strokeStyle = glowColor;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Add strong glow effect when on fire
            if (ball.isOnFire) {
                ctx.shadowColor = 'rgba(255, 68, 68, 0.9)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.strokeStyle = 'rgba(255, 107, 107, 0.8)';
                ctx.lineWidth = 12;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 2, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(22, 244, 208, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawBackground() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Main game loop
        function gameLoop() {
            if (!gameActive) return;

            drawBackground();
            drawCenterLine();

            updatePlayerPaddle();
            updateComputerPaddle();
            updateBall();

            drawPaddle(playerPaddle);
            drawPaddle(computerPaddle);
            drawBall();

            requestAnimationFrame(gameLoop);
        }

        // Initialize
        updateScoreboard();
    </script>
</body>
</html>
